# Netlify configuration — Triage4US
#
# Edge function `gate` protects the site with a pre-launch password screen.
# The function's path/excludedPath config lives IN-SOURCE at
# `netlify/edge-functions/gate.ts` (see `export const config`). We declare
# only the binding here so the two never drift — Netlify merges in-source
# config with this block, and in-source wins for `excludedPath`.
#
# To disable the gate without removing the function: unset GATE_PASSWORD
# in the Netlify site settings (the function will call ctx.next() on every
# request).

# Edge function gate is DISABLED — team is on Netlify Free tier and
# exhausted the monthly edge function invocation pool, which makes the
# function throw `usage_exceeded` 503s on every non-cached path. Until
# the quota resets (or the team upgrades to Pro), the pre-launch gate
# runs client-side from inside index.html instead. The function source
# at `netlify/edge-functions/gate.ts` is kept for easy re-enable —
# uncomment the block below to reactivate once quota is healthy.
#
# [[edge_functions]]
#   path = "/*"
#   function = "gate"
